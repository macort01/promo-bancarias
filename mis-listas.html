<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0033A0">
    <title>Mis Listas - Promos Argentina</title>
    <link rel="manifest" href="/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1 class="logo">
                <i class="fas fa-list"></i>
                <span>Mis Listas</span>
            </h1>
            <button class="add-list-btn" id="addListBtn">
                <i class="fas fa-plus"></i>
            </button>
        </div>
    </header>

    <main class="main-content">
        <!-- Favorites Section -->
        <section class="favorites-section">
            <h3 class="section-title">
                <i class="fas fa-heart"></i> Promociones favoritas
            </h3>
            <div class="promotions-grid" id="favoritesGrid">
                <!-- Favoritos se cargan dinámicamente -->
            </div>
        </section>

        <!-- Custom Lists -->
        <section class="custom-lists-section" style="margin-top: 32px;">
            <div class="section-header">
                <h3 class="section-title">Mis listas personalizadas</h3>
            </div>
            <div id="customLists">
                <!-- Empty state -->
                <div class="empty-state">
                    <i class="fas fa-clipboard-list"></i>
                    <h4>No tenés listas todavía</h4>
                    <p>Creá tu primera lista para organizar tus promociones favoritas</p>
                    <button class="create-list-btn" onclick="document.getElementById('addListBtn').click()">
                        <i class="fas fa-plus"></i> Crear lista
                    </button>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="/" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Inicio</span>
        </a>
        <a href="/buscador.html" class="nav-item">
            <i class="fas fa-search"></i>
            <span>Buscador</span>
        </a>
        <a href="/mis-listas.html" class="nav-item active">
            <i class="fas fa-list"></i>
            <span>Mis listas</span>
        </a>
        <a href="/mi-cuenta.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Mi cuenta</span>
        </a>
    </nav>

    <style>
        .add-list-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: var(--white);
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition-fast);
            backdrop-filter: blur(10px);
        }

        .add-list-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: rotate(90deg);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state i {
            font-size: 64px;
            color: var(--gray-300);
            margin-bottom: 16px;
        }

        .empty-state h4 {
            font-size: 18px;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
            color: var(--gray-600);
            margin-bottom: 24px;
        }

        .create-list-btn {
            padding: 12px 24px;
            background: var(--gradient-primary);
            color: var(--white);
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .create-list-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
    </style>

    <script src="/js/app.js"></script>
    <script>
        const favoritesGrid = document.getElementById('favoritesGrid');
        
        window.addEventListener('load', loadFavorites);

        async function loadFavorites() {
            const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
            
            if (favorites.length === 0) {
                favoritesGrid.innerHTML = `
                    <div style="grid-column: 1/-1;" class="empty-state">
                        <i class="fas fa-heart"></i>
                        <h4>No tenés favoritos todavía</h4>
                        <p>Tocá el corazón en las promociones que te interesen</p>
                    </div>
                `;
                return;
            }

            // Load all promotions and filter favorites
            const allPromotions = await fetchPromotions();
            const favoritePromos = allPromotions.filter(p => favorites.includes(p.id));
            
            renderPromotions(favoritePromos);
        }
    </script>
</body>
</html>
